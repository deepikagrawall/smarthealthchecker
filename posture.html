<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Posture Detective - Smart Health</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a0c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .video-container {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #video {
            width: 100%;
            max-width: 640px;
            border-radius: 16px;
            transform: scaleX(-1);
            background: #000;
        }
        
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .posture-status {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 16px;
        }
        
        .posture-good {
            background: rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4caf50;
        }
        
        .posture-bad {
            background: rgba(244, 67, 54, 0.2);
            border-left: 4px solid #f44336;
        }
        
        .posture-warning {
            background: rgba(255, 152, 0, 0.2);
            border-left: 4px solid #ff9800;
        }
        
        .status-icon {
            font-size: 48px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .timer {
            font-size: 36px;
            font-family: monospace;
            text-align: center;
            margin: 15px 0;
        }
        
        .hidden {
            display: none;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .exercise-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .exercise-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }
        
        .reminder-card {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Posture Detective</h1>
            <p>Simple camera-based posture reminder - Stand up straight!</p>
        </div>
        
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="button-group">
                <button id="startBtn" class="btn btn-primary">🎥 Start Camera</button>
                <button id="stopBtn" class="btn btn-secondary" disabled>⏹️ Stop</button>
            </div>
        </div>
        
        <div class="status-card">
            <div id="postureDisplay" class="posture-status posture-good">
                <div class="status-icon">🧘</div>
                <div>
                    <h3>Ready</h3>
                    <p>Click Start Camera and sit naturally</p>
                </div>
            </div>
        </div>
        
        <div class="status-card">
            <h3>📊 Session Stats</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="goodCount">0</div>
                    <div>Good Posture</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="badCount">0</div>
                    <div>Bad Posture</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="score">100</div>
                    <div>Score %</div>
                </div>
            </div>
        </div>
        
        <div class="status-card">
            <h3>🧘 Quick Posture Fixes</h3>
           <div class="exercise-grid">
    <div class="exercise-btn" data-type="neck">🦒 Neck Stretch</div>
    <div class="exercise-btn" data-type="shoulder">🔄 Shoulder Rolls</div>
    <div class="exercise-btn" data-type="back">🐱 Cat-Cow Stretch</div>
    <div class="exercise-btn" data-type="stand">🧍 Stand Up!</div>
</div>
        </div>
        
        <div id="reminderCard" class="reminder-card hidden">
            <div id="exerciseName" style="font-size: 20px; margin-bottom: 10px;"></div>
            <div id="exerciseInstruction" style="margin-bottom: 15px;"></div>
            <div id="exerciseTimer" class="timer"></div>
            <button  class="btn btn-secondary" id="closeReminderBtn">Close</button>
        </div>
    </div>
    
 <script src="posture.js"></script>
</body>
</html>
