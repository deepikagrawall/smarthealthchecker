<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Health</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      margin: 0;
      padding: 12px;
    }

    /* Main Container */
    .container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h2 {
      font-size: 24px;
      background: linear-gradient(135deg, #fff, #a0c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    /* Timer Section */
    .timer-section {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
      border: 1px solid rgba(102,126,234,0.3);
    }

    .timer-title {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .countdown {
      font-size: 32px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      color: #667eea;
      margin: 8px 0;
    }

    .next-reminder {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      transition: all 0.3s;
    }

    .stat-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .stat-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
    }

    .stat-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .stat-btn {
      background: rgba(102,126,234,0.3);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      color: white;
      transition: all 0.2s;
    }

    .stat-btn:hover {
      background: #667eea;
      transform: scale(1.1);
    }

    .stat-btn.minus {
      background: rgba(244,67,54,0.5);
    }

    .stat-btn.minus:hover {
      background: #f44336;
    }

    /* Score Card */
    .score-card {
      background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }

    .score-value {
      font-size: 48px;
      font-weight: bold;
      color: #00e5ff;
    }

    .score-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    /* AI Tip */
    .ai-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 16px;
      border-left: 3px solid #667eea;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .btn-danger {
      background: rgba(244,67,54,0.8);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    /* Toggle Button */
    .toggle-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .toggle-btn.on {
      background: #4caf50;
      color: white;
    }

    .toggle-btn.off {
      background: #f44336;
      color: white;
    }

    .toggle-btn:hover {
      transform: translateY(-2px);
    }

    /* Progress Bar */
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>🧠 Smart Health</h2>
    <p>Track your wellness journey</p>
  </div>

  <!-- Timer Display -->
  <div class="timer-section">
    <div class="timer-title">⏰ NEXT REMINDER</div>
    <div class="countdown" id="countdown">--:--:--</div>
    <div class="next-reminder" id="nextReminderType">Loading...</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">💧</div>
      <div class="stat-value" id="water">0</div>
      <div class="stat-label">Water</div>
      <div class="stat-buttons">
        <button class="stat-btn minus" id="waterMinus">-</button>
        <button class="stat-btn" id="waterBtn">+</button>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon">🧍</div>
      <div class="stat-value" id="stand">0</div>
      <div class="stat-label">Stand Breaks</div>
      <div class="stat-buttons">
        <button class="stat-btn minus" id="standMinus">-</button>
        <button class="stat-btn" id="standBtn">+</button>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon">🍱</div>
      <div class="stat-value" id="lunch">0</div>
      <div class="stat-label">Meals</div>
      <div class="stat-buttons">
        <button class="stat-btn minus" id="lunchMinus">-</button>
        <button class="stat-btn" id="lunchBtn">+</button>
      </div>
    </div>
  </div>

  <!-- Score Card -->
  <div class="score-card">
    <div class="score-value" id="score">0</div>
    <div class="score-label">Wellness Score</div>
  </div>

  <!-- AI Tip -->
  <div class="ai-box">
    💡 <span id="aiTip">Loading tip...</span>
  </div>

  <!-- Action Buttons -->
  <div class="btn-group">
    <button class="btn btn-secondary" id="reset">Reset</button>
    <button class="btn btn-secondary" id="settingsBtn">⚙️ Settings</button>
    <button class="btn btn-secondary" id="testBtn">🔔 Test</button>
  </div>

  <!-- Timer Toggle -->
  <button class="toggle-btn" id="toggleBtn">Loading...</button>
</div>

<script src="popup.js"></script>
</body>
</html>
